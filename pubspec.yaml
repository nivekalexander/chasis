name: chasis
description: Orquestador de microfrontends en Flutter.

publish_to: 'none' # 🔧 No se publica, ya que orquesta los microfrontends.

version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # 📌 🔄 Manejo de estado con BLoC
  flutter_bloc: ^8.1.3  

  # 📌 🌍 Navegación con `go_router`
  go_router: ^10.1.2  # 📌 Mantener actualizado para compatibilidad.

  # 📌 📡 Cliente HTTP para comunicarse con `home` y `login`
  dio: ^5.3.2           

  # 📌 🔐 Almacenamiento seguro de datos compartidos
  flutter_secure_storage: ^8.0.0  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
